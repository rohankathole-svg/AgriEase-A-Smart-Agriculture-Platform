      <path d="M 0,-26 Q 0,-15 0,-2" stroke="#86efac" stroke-width="0.8" fill="none"/>
      
      <ellipse cx="-11" cy="-5" rx="7" ry="14" fill="#166534" stroke="#fff" stroke-width="1.3" transform="rotate(-30 -11 -5)"/>
      <path d="M -11,-19 Q -7,-11 -4,-3" stroke="#86efac" stroke-width="0.8" fill="none"/>
      
      <ellipse cx="11" cy="-5" rx="7" ry="14" fill="#166534" stroke="#fff" stroke-width="1.3" transform="rotate(30 11 -5)"/>
