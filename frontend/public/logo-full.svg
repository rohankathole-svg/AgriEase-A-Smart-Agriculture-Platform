      <polygon points="-22,-42 -17,-36 -25,-35"/>
      <polygon points="-32,-20 -26,-17 -32,-12"/>
      <polygon points="-22,2 -17,-4 -25,-5"/>
    </g>
    
    <ellipse cx="0" cy="40" rx="62" ry="42" fill="#84cc16"/>
    <ellipse cx="0" cy="36" rx="58" ry="38" fill="#65a30d"/>
    <ellipse cx="0" cy="32" rx="54" ry="34" fill="#4d7c0f"/>
    
    <path d="M -40 32 Q -25 36, -12 32" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <path d="M -35 40 Q -20 44, -8 40" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <path d="M 8 40 Q 20 44, 35 40" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <path d="M 12 32 Q 25 36, 40 32" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    
    <g transform="translate(0, -15)">
