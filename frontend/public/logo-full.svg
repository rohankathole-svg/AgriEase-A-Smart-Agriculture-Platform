    <circle cx="0" cy="0" r="78" fill="none" stroke="#fff" stroke-width="2.5"/>
    
    <circle cx="0" cy="-30" r="32" fill="#fbbf24"/>
    
    <g fill="#fbbf24">
      <polygon points="0,-60 -4,-50 4,-50"/>
      <polygon points="22,-42 17,-36 25,-35"/>
      <polygon points="32,-20 26,-17 32,-12"/>
