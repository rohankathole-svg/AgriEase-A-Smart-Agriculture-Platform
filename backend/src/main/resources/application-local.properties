# ===============================
# LOCAL DEVELOPMENT DATABASE
# ===============================
# Use this profile when Supabase is unavailable
# PowerShell: mvn spring-boot:run "-Dspring-boot.run.profiles=local"
# CMD:        mvn spring-boot:run -Dspring-boot.run.profiles=local

# Local PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/agriease_dev
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Create tables automatically for local development
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# LOGGING
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.agriease.backend.config.JwtFilter=DEBUG
logging.level.org.springframework.security=DEBUG

