# ===============================
# SERVER
# ===============================
server.port=8080
server.servlet.context-path=/agriease

# ===============================
# DATASOURCE (Supabase PostgreSQL)
# ===============================
# Hosted database so both environments share same data source.
spring.datasource.url=jdbc:postgresql://db.qyqcjqfapdyhkjmrlgbs.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=Agriease@1234
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# LOGGING (optional but useful)
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.agriease.backend.config.JwtFilter=DEBUG
logging.level.org.springframework.security=DEBUG

